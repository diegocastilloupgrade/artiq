<mat-card class="topics-card">
  <mat-card-header>
    <mat-card-title>Topics</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <!-- Filtros -->
    <div class="filters">
      <mat-form-field appearance="outline">
        <mat-label>Estado</mat-label>
        <mat-select [(ngModel)]="filterStatus" (ngModelChange)="applyFilters()">
          <mat-option value="">Todos</mat-option>
          <mat-option *ngFor="let s of statusOptions" [value]="s">{{ s }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Tipo</mat-label>
        <mat-select [(ngModel)]="filterType" (ngModelChange)="applyFilters()">
          <mat-option value="">Todos</mat-option>
          <mat-option *ngFor="let t of typeOptions" [value]="t">{{ t }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Spinner de carga -->
    <div *ngIf="loading" class="spinner-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <!-- Mensaje de error -->
    <p *ngIf="error" class="error-msg">{{ error }}</p>

    <!-- Tabla -->
    <div *ngIf="!loading" class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="topics-table">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let t">
            <a class="topic-link" [routerLink]="['/topics', t.id]">{{ t.name }}</a>
          </td>
        </ng-container>

        <ng-container matColumnDef="source">
          <th mat-header-cell *matHeaderCellDef>Fuente</th>
          <td mat-cell *matCellDef="let t">{{ t.source }}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Tipo</th>
          <td mat-cell *matCellDef="let t">{{ t.type }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let t">{{ t.status }}</td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Prioridad</th>
          <td mat-cell *matCellDef="let t">{{ t.priority }}</td>
        </ng-container>

        <ng-container matColumnDef="created_at">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Creado</th>
          <td mat-cell *matCellDef="let t">{{ t.created_at | date:'short' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">Sin resultados</td>
        </tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
